parameters:
  - name: serviceConnection
    type: string
  - name: backendResourceGroup
    type: string
  - name: backendStorageAccount
    type: string
  - name: environmentGroup
    type: string
  - name: environment
    type: string
  - name: appName
    type: string
  - name: systemAdministratorUpns
    type: object
    default: []
    displayName: "List of AAD UPNs to add as db_owner in addition to the managed identity"

steps:
  - checkout: git://Comharte.Standard/Comharte.Standard.Infrastructure
    displayName: Checkout Infrastructure
    path: infrastructure-global

  - task: TerraformInstaller@1
    displayName: Install Terraform
    inputs:
      terraformVersion: "1.14.8"

  - task: TerraformTaskV4@4
    displayName: Terraform Init
    inputs:
      provider: azurerm
      command: init
      workingDirectory: $(Pipeline.Workspace)/infrastructure-global/terraform/apps-service
      backendServiceArm: ${{ parameters.serviceConnection }}
      backendAzureRmResourceGroupName: ${{ parameters.backendResourceGroup }}
      backendAzureRmStorageAccountName: ${{ parameters.backendStorageAccount }}
      backendAzureRmContainerName: terraform-states-${{ parameters.environmentGroup }}
      backendAzureRmKey: apps-service-${{ parameters.appName }}-${{ parameters.environment }}.tfstate
      backendAzureRmUseAzureAdForAuthentication: true
      commandOptions: -backend-config=use_azuread_auth=true

  - task: TerraformTaskV4@4
    displayName: Terraform Plan
    inputs:
      provider: azurerm
      command: plan
      workingDirectory: $(Pipeline.Workspace)/infrastructure-global/terraform/apps-service
      environmentServiceNameAzureRM: ${{ parameters.serviceConnection }}
      commandOptions: >-
        -var="backend_resource_group=${{ parameters.backendResourceGroup }}"
        -var="backend_storage_account=${{ parameters.backendStorageAccount }}"
        -var="environment_group=${{ parameters.environmentGroup }}"
        -var="environment=${{ parameters.environment }}"
        -var="app_name=${{ parameters.appName }}"
        -out=$(Pipeline.Workspace)/tfplan

  - task: TerraformTaskV4@4
    displayName: Terraform Apply
    inputs:
      provider: azurerm
      command: apply
      workingDirectory: $(Pipeline.Workspace)/infrastructure-global/terraform/apps-service
      environmentServiceNameAzureRM: ${{ parameters.serviceConnection }}
      commandOptions: $(Pipeline.Workspace)/tfplan

  - bash: |
      curl -sSL https://github.com/microsoft/go-sqlcmd/releases/latest/download/sqlcmd-linux-amd64.tar.bz2 | sudo tar -xj -C /usr/local/bin sqlcmd
    displayName: Install sqlcmd

  - task: AzureCLI@2
    displayName: Create SQL Database Users
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptType: pscore
      scriptLocation: inlineScript
      workingDirectory: $(Pipeline.Workspace)/infrastructure-global/terraform/apps-service
      inlineScript: |
        $server = terraform output -raw sql_server_fqdn
        $database = terraform output -raw database_name
        $managedIdentity = terraform output -raw managed_identity_name
        $servicePrincipal = terraform output -raw service_principal_name
        $sqlServerName = terraform output -raw sql_server_name
        $sqlServerResourceGroup = terraform output -raw sql_server_resource_group
        $adminUpns = "${{ join(';', parameters.systemAdministratorUpns) }}"
        $users = if ($adminUpns) { "$managedIdentity;$servicePrincipal;$adminUpns" } else { "$managedIdentity;$servicePrincipal" }
        $agentIp = (Invoke-RestMethod -Uri "https://api.ipify.org?format=json").ip
        $firewallRuleName = "pipeline-agent-$(New-Guid)"
        az sql server firewall-rule create --server $sqlServerName --resource-group $sqlServerResourceGroup --name $firewallRuleName --start-ip-address $agentIp --end-ip-address $agentIp
        try {
          $output = sqlcmd -S $server -d $database -G -Q "
          DECLARE @v_principal_names NVARCHAR(MAX) = '$users'

          IF OBJECT_ID('tempDb..#principal_names','U') IS NOT NULL
              DROP TABLE #principal_names

          SELECT DISTINCT [value]
          INTO #principal_names
          FROM string_split(@v_principal_names,';')

          WHILE (EXISTS (SELECT 1 FROM #principal_names))
          BEGIN
              DECLARE
                   @v_principal_name NVARCHAR(MAX) = (SELECT TOP 1 [value] FROM #principal_names)
                  ,@v_database_role NVARCHAR(MAX) = 'db_owner'

              DELETE pn
              FROM #principal_names pn
              WHERE 1 = 1
                  AND pn.[value] = @v_principal_name

              IF NOT EXISTS (SELECT 1 FROM sys.database_principals dp WHERE dp.name = @v_principal_name)
              BEGIN
                  DECLARE @v_script_create_user NVARCHAR(MAX) = 'CREATE USER ['+@v_principal_name+'] FROM EXTERNAL PROVIDER'
                  EXECUTE(@v_script_create_user)

                  DECLARE @v_script_addrolemember NVARCHAR(MAX) = 'EXEC sp_addrolemember N'''+@v_database_role+''', N'''+@v_principal_name+''''
                  EXECUTE(@v_script_addrolemember)
              END
          END
        "
          Write-Output $output
          if ($output -match "Msg \d+") { throw "sqlcmd reported errors" }
        } finally {
          az sql server firewall-rule delete --server $sqlServerName --resource-group $sqlServerResourceGroup --name $firewallRuleName
        }
