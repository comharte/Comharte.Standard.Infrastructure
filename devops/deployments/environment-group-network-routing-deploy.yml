parameters:
  - name: serviceConnection
    type: string
  - name: backendResourceGroup
    type: string
  - name: backendStorageAccount
    type: string
  - name: environmentGroup
    type: string
  - name: nginxConfigFile
    type: string
    displayName: "Path to nginx.conf file (may contain {{SecretName}} placeholders)"
  - name: keyVaults
    type: string
    displayName: "Comma-separated Key Vault names to resolve nginx.conf placeholders from"

steps:
  - checkout: git://Comharte.Standard/Comharte.Standard.Infrastructure
    displayName: Checkout Infrastructure
    path: infrastructure-global

  - task: TerraformInstaller@1
    displayName: Install Terraform
    inputs:
      terraformVersion: "1.14.8"

  - task: AzureCLI@2
    displayName: Resolve nginx.conf placeholders and write tfvars
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptType: pscore
      scriptLocation: scriptPath
      scriptPath: $(Pipeline.Workspace)/infrastructure-global/devops/scripts/networking-rebuild-services-networking-file.ps1
      arguments: >-
        -NetworkingFile "${{ parameters.nginxConfigFile }}"
        -KeyVaults      "${{ parameters.keyVaults }}"
        -OutputFile     "$(Pipeline.Workspace)/infrastructure-global/terraform/environment-group-network-routing/nginx.conf.resolved"

  - pwsh: |
      $content = Get-Content "$(Pipeline.Workspace)/infrastructure-global/terraform/environment-group-network-routing/nginx.conf.resolved" -Raw
      @{ nginx_config = $content } | ConvertTo-Json -Depth 1 |
        Set-Content "$(Pipeline.Workspace)/infrastructure-global/terraform/environment-group-network-routing/nginx_config.auto.tfvars.json" -Encoding UTF8
      Write-Host "[OK] Written nginx_config.auto.tfvars.json"
    displayName: Write nginx config tfvars

  - task: TerraformTaskV4@4
    displayName: Terraform Init
    inputs:
      provider: azurerm
      command: init
      workingDirectory: $(Pipeline.Workspace)/infrastructure-global/terraform/environment-group-network-routing
      backendServiceArm: ${{ parameters.serviceConnection }}
      backendAzureRmResourceGroupName: ${{ parameters.backendResourceGroup }}
      backendAzureRmStorageAccountName: ${{ parameters.backendStorageAccount }}
      backendAzureRmContainerName: terraform-states-${{ parameters.environmentGroup }}
      backendAzureRmKey: environment-group-network-routing.tfstate
      backendAzureRmUseAzureAdForAuthentication: true
      commandOptions: -backend-config=use_azuread_auth=true

  - task: TerraformTaskV4@4
    displayName: Terraform Plan
    inputs:
      provider: azurerm
      command: plan
      workingDirectory: $(Pipeline.Workspace)/infrastructure-global/terraform/environment-group-network-routing
      environmentServiceNameAzureRM: ${{ parameters.serviceConnection }}
      commandOptions: >-
        -var="backend_resource_group=${{ parameters.backendResourceGroup }}"
        -var="backend_storage_account=${{ parameters.backendStorageAccount }}"
        -var="environment_group=${{ parameters.environmentGroup }}"
        -out=$(Pipeline.Workspace)/tfplan

  - task: TerraformTaskV4@4
    displayName: Terraform Apply
    inputs:
      provider: azurerm
      command: apply
      workingDirectory: $(Pipeline.Workspace)/infrastructure-global/terraform/environment-group-network-routing
      environmentServiceNameAzureRM: ${{ parameters.serviceConnection }}
      commandOptions: $(Pipeline.Workspace)/tfplan
