parameters:
  - name: serviceConnection
    type: string
  - name: backendResourceGroup
    type: string
  - name: backendStorageAccount
    type: string
  - name: organizationCode
    type: string
  - name: servicesNetworkingFile
    type: string
  - name: networkingKeyVaults
    type: string
  - name: networkingCertificateKeyVault
    type: string
  - name: networkingCertificates
    type: string

steps:
  - checkout: infraGlobal
    displayName: Checkout Terraform Scripts
    path: infrastructure-global

  - task: TerraformInstaller@1
    displayName: Install Terraform
    inputs:
      terraformVersion: "1.14.8"

  - task: AzureCLI@2
    displayName: Resolve secrets and write apps variable
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptType: pscore
      scriptLocation: scriptPath
      scriptPath: $(Pipeline.Workspace)/infrastructure-global/devops/scripts/networking-rebuild-services-networking-file.ps1
      arguments: >-
        -NetworkingFile "${{ parameters.servicesNetworkingFile }}"
        -KeyVaults      "${{ parameters.networkingKeyVaults }}"
        -OutputFile     "$(Pipeline.Workspace)/infrastructure-global/terraform/networking/apps.auto.tfvars.json"

  - task: AzureCLI@2
    displayName: Inject SSL certificates into tfvars
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptType: pscore
      scriptLocation: scriptPath
      scriptPath: $(Pipeline.Workspace)/infrastructure-global/devops/scripts/networking-inject-certificates.ps1
      arguments: >-
        -KeyVault      "${{ parameters.networkingCertificateKeyVault }}"
        -Certificates  "${{ parameters.networkingCertificates }}"
        -OutputFile    "$(Pipeline.Workspace)/infrastructure-global/terraform/networking/ssl_certificates.auto.tfvars.json"

  - task: TerraformTaskV4@4
    displayName: Terraform Init
    inputs:
      provider: azurerm
      command: init
      workingDirectory: $(Pipeline.Workspace)/infrastructure-global/terraform/networking
      backendServiceArm: ${{ parameters.serviceConnection }}
      backendAzureRmResourceGroupName: ${{ parameters.backendResourceGroup }}
      backendAzureRmStorageAccountName: ${{ parameters.backendStorageAccount }}
      backendAzureRmContainerName: terraform-states-global
      backendAzureRmKey: networking.tfstate
      backendAzureRmUseAzureAdForAuthentication: true
      commandOptions: -backend-config=use_azuread_auth=true

  - task: TerraformTaskV4@4
    displayName: Terraform Plan
    inputs:
      provider: azurerm
      command: plan
      workingDirectory: $(Pipeline.Workspace)/infrastructure-global/terraform/networking
      environmentServiceNameAzureRM: ${{ parameters.serviceConnection }}
      commandOptions: >-
        -var="organization_code=${{ parameters.organizationCode }}"
        -out=$(Pipeline.Workspace)/tfplan

  - task: TerraformTaskV4@4
    displayName: Terraform Apply
    inputs:
      provider: azurerm
      command: apply
      workingDirectory: $(Pipeline.Workspace)/infrastructure-global/terraform/networking
      environmentServiceNameAzureRM: ${{ parameters.serviceConnection }}
      commandOptions: $(Pipeline.Workspace)/tfplan
