parameters:
  - name: repositoryName
    type: string
  - name: artifactName
    type: string

steps:
  - task: Docker@2
    displayName: Build Docker Image
    inputs:
      command: build
      repository: ${{ parameters.repositoryName }}
      dockerfile: Dockerfile
      tags: $(Build.BuildId)

  - bash: |
      docker save ${{ parameters.repositoryName }}:$(Build.BuildId) -o $(Build.ArtifactStagingDirectory)/${{ parameters.repositoryName }}.tar
    displayName: Save Docker Image to File

  - task: PublishPipelineArtifact@1
    displayName: Publish Docker Artifact
    inputs:
      targetPath: $(Build.ArtifactStagingDirectory)/${{ parameters.repositoryName }}.tar
      artifact: ${{ parameters.artifactName }}
